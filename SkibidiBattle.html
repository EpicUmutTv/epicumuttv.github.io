<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Skibidi Battle</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');
:root{--bg1:#050a1a;--bg2:#0a1530;--blue:#1a6fd4;--blue2:#2d9cff;--red:#c0392b;--red2:#e74c3c;--gold:#f1c40f;--gold2:#f39c12;--green:#27ae60;--gray:#95a5a6;--white:#ecf0f1;--panel:rgba(6,14,36,0.97);--border:rgba(45,156,255,0.3);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Rajdhani',sans-serif;color:var(--white);touch-action:manipulation;}
#bg-canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;}
.screen{position:fixed;top:0;left:0;width:100%;height:100%;z-index:10;display:none;flex-direction:column;align-items:center;justify-content:center;}
.screen.active{display:flex;}
#menu-screen{background:transparent;}
.menu-logo{text-align:center;margin-bottom:10px;animation:floatY 3s ease-in-out infinite;}
.title1{font-family:'Orbitron',sans-serif;font-size:clamp(24px,7vw,60px);font-weight:900;color:var(--blue2);text-shadow:0 0 30px var(--blue2),0 0 60px var(--blue);letter-spacing:4px;}
.title2{font-family:'Orbitron',sans-serif;font-size:clamp(12px,3.5vw,24px);font-weight:700;color:var(--red2);letter-spacing:8px;text-shadow:0 0 20px var(--red2);}
.maker{font-size:clamp(9px,2vw,13px);color:var(--gray);letter-spacing:3px;margin-top:4px;}
#hero-canvas{display:block;margin:0 auto 6px;}
.menu-buttons{display:flex;flex-direction:column;align-items:center;gap:11px;width:100%;max-width:300px;padding:0 20px;}
.btn-play{background:linear-gradient(135deg,var(--blue),var(--blue2));border:2px solid var(--blue2);color:#fff;font-family:'Orbitron',sans-serif;font-size:clamp(14px,4vw,20px);font-weight:700;letter-spacing:3px;padding:14px 50px;border-radius:50px;cursor:pointer;box-shadow:0 0 25px var(--blue),0 4px 20px rgba(0,0,0,.5);width:100%;position:relative;overflow:hidden;}
.btn-play::after{content:'';position:absolute;top:-50%;left:-60%;width:40%;height:200%;background:rgba(255,255,255,.15);transform:skewX(-20deg);animation:shimmer 3s infinite;}
.btn-play:active{transform:scale(.96);}
.btn-info{background:transparent;border:1.5px solid var(--border);color:var(--blue2);font-family:'Rajdhani',sans-serif;font-size:clamp(12px,3vw,16px);font-weight:600;letter-spacing:2px;padding:11px 40px;border-radius:50px;cursor:pointer;width:100%;}
.btn-info:active{background:rgba(45,156,255,.1);}
#btn-settings{position:fixed;bottom:20px;left:20px;z-index:50;width:52px;height:52px;background:rgba(10,21,48,.92);border:1.5px solid var(--border);border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:22px;}
#btn-settings:active{transform:rotate(60deg);}
#btn-chars{position:fixed;bottom:20px;right:20px;z-index:50;background:rgba(10,21,48,.92);border:1.5px solid var(--border);border-radius:12px;padding:9px 14px;cursor:pointer;font-family:'Orbitron',sans-serif;font-size:10px;color:var(--blue2);letter-spacing:1px;display:flex;flex-direction:column;align-items:center;gap:3px;}
/* PANELS */
.panel-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:200;background:rgba(0,0,0,.78);display:none;align-items:center;justify-content:center;}
.panel-overlay.open{display:flex;}
.panel-box{background:var(--panel);border:1.5px solid var(--border);border-radius:16px;padding:24px;width:90%;max-width:420px;max-height:88vh;overflow-y:auto;position:relative;}
.panel-title{font-family:'Orbitron',sans-serif;font-size:17px;color:var(--blue2);letter-spacing:2px;margin-bottom:20px;text-align:center;}
.panel-close{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--gray);font-size:24px;cursor:pointer;line-height:1;padding:4px 6px;z-index:5;}
.panel-close:active{color:var(--red2);}
.setting-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.07);}
.setting-row:last-child{border-bottom:none;}
.setting-label{font-size:15px;font-weight:600;}
.toggle-btn{width:52px;height:28px;border-radius:14px;border:none;cursor:pointer;position:relative;transition:background .3s;}
.toggle-btn.on{background:var(--blue);}
.toggle-btn.off{background:#333;}
.toggle-btn::after{content:'';position:absolute;top:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:left .3s;}
.toggle-btn.on::after{left:27px;}
.toggle-btn.off::after{left:3px;}
.lang-select{background:#0a1530;border:1px solid var(--border);color:var(--white);padding:8px 10px;border-radius:8px;font-family:'Rajdhani',sans-serif;font-size:13px;cursor:pointer;}
/* LEVELS */
#levels-screen{background:rgba(0,0,0,.88);overflow-y:auto;padding:20px;align-items:stretch;justify-content:flex-start;}
.levels-header{text-align:center;padding:18px 0 14px;position:sticky;top:0;background:rgba(0,0,0,.9);z-index:5;}
.levels-header h1{font-family:'Orbitron',sans-serif;font-size:clamp(15px,5vw,26px);color:var(--blue2);}
.btn-back{position:absolute;left:10px;top:50%;transform:translateY(-50%);background:none;border:1.5px solid var(--border);color:var(--blue2);padding:7px 13px;border-radius:8px;cursor:pointer;font-size:17px;}
.levels-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:7px;max-width:500px;margin:0 auto;padding:8px 0 70px;}
@media(max-width:380px){.levels-grid{grid-template-columns:repeat(4,1fr);}}
.lvl-btn{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;border:2px solid;gap:1px;}
.lvl-btn .ln{font-family:'Orbitron',sans-serif;font-size:clamp(10px,3vw,14px);font-weight:700;}
.lvl-btn.normal{background:rgba(241,196,15,.1);border-color:var(--gold);color:var(--gold);}
.lvl-btn.normal:active{background:rgba(241,196,15,.25);transform:scale(.95);}
.lvl-btn.boss{background:rgba(192,57,43,.2);border-color:var(--red2);color:var(--red2);}
.lvl-btn.boss:active{background:rgba(192,57,43,.35);transform:scale(.95);}
.lvl-btn.locked{background:rgba(30,30,30,.3);border-color:#222;color:#333;cursor:not-allowed;}
.lvl-more{grid-column:1/-1;text-align:center;padding:12px;font-size:12px;color:var(--gray);border:1.5px dashed #333;border-radius:10px;margin-top:4px;}
/* GAME */
#game-screen{background:#000;flex-direction:column;justify-content:flex-start;padding:0;}
#game-canvas{width:100%;flex:1;display:block;}
.game-ui{position:fixed;top:0;left:0;right:0;padding:9px 14px;display:flex;align-items:center;justify-content:space-between;z-index:30;background:rgba(0,0,0,.55);}
.game-level-badge{font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);}
.game-coins{display:flex;align-items:center;gap:5px;font-family:'Orbitron',sans-serif;font-size:13px;color:var(--gold);}
.hp-wrap{position:fixed;left:50%;transform:translateX(-50%);width:90%;max-width:500px;z-index:30;}
.hp-wrap.player-hp{bottom:130px;}
.hp-wrap.boss-hp{top:55px;}
.hp-label{font-size:10px;color:var(--gray);margin-bottom:3px;text-align:center;font-family:'Orbitron',sans-serif;letter-spacing:1px;}
.hp-track{height:13px;background:#111;border-radius:7px;border:1px solid #222;overflow:hidden;}
.hp-fill{height:100%;border-radius:7px;transition:width .25s;}
.hp-fill.player{background:linear-gradient(90deg,#27ae60,#2ecc71);}
.hp-fill.enemy{background:linear-gradient(90deg,var(--red),var(--red2));}
.ability-bar{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:30;}
.ab-btn{width:clamp(60px,15vw,75px);height:clamp(60px,15vw,75px);border-radius:14px;border:2px solid;background:rgba(8,16,40,.93);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;gap:2px;user-select:none;-webkit-user-select:none;position:relative;overflow:hidden;}
.ab-btn:active:not(.on-cooldown){transform:scale(.88);}
.ab-btn.ab1{border-color:var(--blue2);color:var(--blue2);}
.ab-btn.ab2{border-color:var(--gold);color:var(--gold);}
.ab-btn.ab3{border-color:var(--red2);color:var(--red2);}
.ab-btn.on-cooldown{opacity:.4;}
.ab-icon{font-size:20px;line-height:1;}
.ab-name{font-size:8px;letter-spacing:1px;font-weight:700;}
.ab-dmg{font-size:9px;opacity:.75;}
.cd-overlay{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:12px;background:rgba(0,0,0,.68);display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;color:#fff;pointer-events:none;}
/* RESULT */
.result-overlay{position:fixed;top:0;left:0;width:100%;height:100%;z-index:300;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;}
.result-overlay.open{display:flex;}
.result-box{background:var(--panel);border:2px solid;border-radius:20px;padding:28px 22px;width:88%;max-width:350px;text-align:center;}
.result-box.win{border-color:var(--gold);}
.result-box.lose{border-color:var(--red2);}
.result-title{font-family:'Orbitron',sans-serif;font-size:24px;font-weight:900;margin-bottom:10px;}
.result-title.win{color:var(--gold);}
.result-title.lose{color:var(--red2);}
.result-coins{font-size:16px;color:var(--gold);margin:8px 0 18px;}
.result-btns{display:flex;flex-direction:column;gap:10px;}
.btn-rr{font-family:'Orbitron',sans-serif;font-size:13px;padding:13px;border-radius:10px;cursor:pointer;letter-spacing:1px;border:none;}
.btn-rr.primary{background:var(--blue);color:#fff;}
.btn-rr.secondary{background:transparent;border:1.5px solid var(--border);color:var(--blue2);}
.btn-rr:active{transform:scale(.96);}
/* CHARS */
.chars-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;}
.char-card{background:rgba(255,255,255,.04);border:1.5px solid;border-radius:12px;padding:11px 8px;text-align:center;cursor:pointer;position:relative;}
.char-card.free{border-color:var(--blue2);}
.char-card.locked{border-color:#2a2a2a;opacity:.55;cursor:not-allowed;}
.char-card.selected{border-color:var(--gold)!important;box-shadow:0 0 12px var(--gold);}
.cname{font-size:10px;font-weight:700;letter-spacing:.5px;margin-top:5px;}
.clock{position:absolute;top:7px;right:7px;font-size:12px;color:#444;}
.csoon{font-size:8px;color:var(--gray);margin-top:2px;}
.info-content p{font-size:13px;line-height:1.7;color:rgba(255,255,255,.85);margin-bottom:8px;}
.info-content h3{font-size:14px;color:var(--blue2);margin:12px 0 5px;letter-spacing:1px;}
.dmg-text{position:fixed;font-family:'Orbitron',sans-serif;font-size:20px;font-weight:700;pointer-events:none;animation:dmgFloat .9s ease-out forwards;z-index:500;text-shadow:0 2px 8px rgba(0,0,0,.8);}
#coin-flash{position:fixed;top:44%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:20px;color:var(--gold);pointer-events:none;opacity:0;transition:opacity .3s;z-index:400;text-shadow:0 0 15px var(--gold);}
@keyframes floatY{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes shimmer{0%{left:-60%}100%{left:160%}}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-52px)}}
</style>
</head>

let musicOn=true,sfxOn=true,audioCtx=null,bgmTimeout=null;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();if(audioCtx.state==='suspended')audioCtx.resume();return audioCtx;}
function tone(freq,type,dur,vol=0.28,freqEnd=null){
  if(!sfxOn)return;
  try{
    const ac=getAC(),o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type||'square';
    o.frequency.setValueAtTime(freq,ac.currentTime);
    if(freqEnd)o.frequency.linearRampToValueAtTime(freqEnd,ac.currentTime+dur);
    g.gain.setValueAtTime(vol,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+dur);
    o.start();o.stop(ac.currentTime+dur);
  }catch(e){}
}

const bgC=document.getElementById('bg-canvas'),bgX=bgC.getContext('2d');
let bW,bH,bP=[];

for(let i=0;i<65;i++)bP.push({x:Math.random()*3000,y:Math.random()*3000,r:Math.random()*2+.4,sx:(Math.random()-.5)*.35,sy:(Math.random()-.5)*.35,b:Math.random()>.45});
(function bgL(){
  bgX.clearRect(0,0,bW,bH);
  const g=bgX.createLinearGradient(0,0,bW,bH);
  g.addColorStop(0,'#030710');g.addColorStop(.5,'#071028');g.addColorStop(1,'#030710');
  bgX.fillStyle=g;bgX.fillRect(0,0,bW,bH);
  bP.forEach(p=>{
    p.x+=p.sx;p.y+=p.sy;
    if(p.x<0)p.x=bW;if(p.x>bW)p.x=0;if(p.y<0)p.y=bH;if(p.y>bH)p.y=0;
    bgX.beginPath();bgX.arc(p.x,p.y,p.r,0,Math.PI*2);
    bgX.fillStyle=p.b?'rgba(45,156,255,.6)':'rgba(192,57,43,.5)';bgX.fill();
  });

})();

// ===== DRAW CAMERAMAN (suit + security camera head) =====
function drawCameraman(ctx,cx,by,sc=1,pistolPhase=0){
  ctx.save();ctx.translate(cx,by);ctx.scale(sc,sc);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.35)';ctx.beginPath();ctx.ellipse(0,4,22,6,0,0,Math.PI*2);ctx.fill();
  // shoes
  ctx.fillStyle='#0d0d0d';
  ctx.beginPath();ctx.ellipse(-13,0,13,5,-.15,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(13,0,13,5,.15,0,Math.PI*2);ctx.fill();
  // trouser legs
  ctx.fillStyle='#0f0f0f';
  ctx.fillRect(-20,-52,15,54);ctx.fillRect(5,-52,15,54);
  // coat lower
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.moveTo(-27,-55);ctx.lineTo(-25,-148);ctx.lineTo(25,-148);ctx.lineTo(27,-55);ctx.closePath();ctx.fill();
  // coat tails (split)
  ctx.fillStyle='#0e0e0e';
  ctx.beginPath();ctx.moveTo(-22,-55);ctx.lineTo(-22,-30);ctx.lineTo(-5,-30);ctx.lineTo(-5,-55);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(5,-55);ctx.lineTo(5,-30);ctx.lineTo(22,-30);ctx.lineTo(22,-55);ctx.closePath();ctx.fill();
  // lapels
  ctx.fillStyle='#181818';
  ctx.beginPath();ctx.moveTo(0,-144);ctx.lineTo(-20,-118);ctx.lineTo(-8,-90);ctx.lineTo(0,-84);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(0,-144);ctx.lineTo(20,-118);ctx.lineTo(8,-90);ctx.lineTo(0,-84);ctx.closePath();ctx.fill();
  // shirt white strip
  ctx.fillStyle='#cacaca';ctx.fillRect(-5,-144,10,60);
  // tie
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.moveTo(-3,-142);ctx.lineTo(3,-142);ctx.lineTo(2.5,-88);ctx.lineTo(0,-83);ctx.lineTo(-2.5,-88);ctx.closePath();ctx.fill();
  // buttons
  ctx.fillStyle='#2a2a2a';
  [-118,-102,-86].forEach(y=>{ctx.beginPath();ctx.arc(0,y,2.2,0,Math.PI*2);ctx.fill();});
  // left arm relaxed
  ctx.fillStyle='#111';
  ctx.save();ctx.translate(-27,-112);ctx.rotate(.14);ctx.fillRect(-7,0,14,56);
  ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.arc(0,58,9,0,Math.PI*2);ctx.fill();
  // fingers
  ctx.fillStyle='#161616';
  [-8,-3,3,8].forEach(fx=>{ctx.beginPath();ctx.ellipse(fx,64,3,6,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
  // right arm raised (thumbs up)
  ctx.fillStyle='#111';
  ctx.save();ctx.translate(27,-112);ctx.rotate(-.38);ctx.fillRect(-7,0,14,50);
  ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.arc(0,52,9,0,Math.PI*2);ctx.fill();
  // thumb pointing up
  ctx.save();ctx.translate(-4,42);ctx.rotate(-.6);
  ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.roundRect(-3,-4,7,16,2);ctx.fill();
  ctx.restore();
  // knuckle bumps
  ctx.fillStyle='#161616';
  [-8,-3,3].forEach(fx=>{ctx.beginPath();ctx.ellipse(fx,55,3,5,0,0,Math.PI*2);ctx.fill();});
  ctx.restore();
  // neck
  ctx.fillStyle='#b0b0b0';ctx.fillRect(-6,-152,12,10);
  // ---- CAMERA HEAD ----
  // mount arm
  ctx.fillStyle='#444';ctx.fillRect(-4,-170,8,20);
  // housing body (white/cream security cam box)
  ctx.fillStyle='#d8d8d8';ctx.beginPath();ctx.roundRect(-24,-202,46,36,5);ctx.fill();
  // housing shade top
  ctx.fillStyle='#c0c0c0';ctx.beginPath();ctx.roundRect(-24,-202,46,9,{upperLeft:5,upperRight:5,lowerLeft:0,lowerRight:0});ctx.fill();
  // vents on side
  ctx.strokeStyle='#b0b0b0';ctx.lineWidth=1;
  [0,4,8].forEach(vy=>{ctx.beginPath();ctx.moveTo(-22,-198+vy);ctx.lineTo(-16,-198+vy);ctx.stroke();});
  // lens housing dark ring
  ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.arc(7,-184,13,0,Math.PI*2);ctx.fill();
  // outer lens ring (rotary dial)
  ctx.strokeStyle='#888';ctx.lineWidth=2;ctx.beginPath();ctx.arc(7,-184,13,0,Math.PI*2);ctx.stroke();
  for(let a=0;a<12;a++){const ang=a/12*Math.PI*2;ctx.beginPath();ctx.moveTo(7+11*Math.cos(ang),-184+11*Math.sin(ang));ctx.lineTo(7+13*Math.cos(ang),-184+13*Math.sin(ang));ctx.stroke();}
  // inner lens blue glass
  ctx.fillStyle='#1a3a6a';ctx.beginPath();ctx.arc(7,-184,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(80,160,255,.35)';ctx.beginPath();ctx.arc(7,-184,9,0,Math.PI*2);ctx.fill();
  // lens reflection
  ctx.fillStyle='rgba(255,255,255,.75)';ctx.beginPath();ctx.arc(3,-188,3,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.arc(11,-181,1.5,0,Math.PI*2);ctx.fill();
  // recording LED (red)
  ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(-14,-184,4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,100,100,.4)';ctx.beginPath();ctx.arc(-14,-184,7,0,Math.PI*2);ctx.fill();
  // === PISTOL ANIMATION ===
  if(pistolPhase>0){
    ctx.save();
    // Right arm raises based on phase
    const armAngle = pistolPhase===1 ? -0.38+(-0.5*(pistolAnim%1)) :
                     pistolPhase===2 ? -0.88 :
                     pistolPhase===3 ? -0.88 :
                     -0.88+0.5*((pistolAnim-1.8)/0.6) ;
    const armT = pistolPhase===1? pistolAnim%1 :
                 pistolPhase===2||pistolPhase===3 ? 1 :
                 Math.max(0,1-((pistolAnim-1.8)/0.6));
    // Draw gun in right hand area
    ctx.translate(27,-112);
    ctx.rotate(armAngle);
    // Arm
    ctx.fillStyle='#111';ctx.fillRect(-7,0,14,50);
    ctx.fillStyle='#1c1c1c';ctx.beginPath();ctx.arc(0,52,9,0,Math.PI*2);ctx.fill();
    // Pistol appears when arm raises
    if(armT>0.3){
      const gunAlpha=Math.min(1,(armT-0.3)/0.3);
      ctx.globalAlpha=gunAlpha;
      // gun barrel
      ctx.fillStyle='#222';ctx.beginPath();ctx.roundRect(4,38,6,22,2);ctx.fill();
      // gun body
      ctx.fillStyle='#333';ctx.beginPath();ctx.roundRect(-2,42,12,14,2);ctx.fill();
      // gun grip
      ctx.fillStyle='#1a1a1a';ctx.beginPath();ctx.roundRect(0,54,8,12,2);ctx.fill();
      // trigger guard
      ctx.strokeStyle='#444';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(4,56,4,Math.PI,0);ctx.stroke();
      // muzzle flash on fire phase
      if(pistolPhase===3){
        const flashAlpha=(1-((pistolAnim-1.5)/0.3))*0.9;
        ctx.globalAlpha=Math.max(0,flashAlpha);
        const flashGrad=ctx.createRadialGradient(7,38,0,7,38,14);
        flashGrad.addColorStop(0,'rgba(255,240,100,1)');
        flashGrad.addColorStop(0.3,'rgba(255,160,30,0.8)');
        flashGrad.addColorStop(1,'rgba(255,80,0,0)');
        ctx.fillStyle=flashGrad;ctx.beginPath();ctx.arc(7,34,14,0,Math.PI*2);ctx.fill();
        // bullet line
        ctx.strokeStyle='rgba(255,220,50,0.7)';ctx.lineWidth=2;
        ctx.beginPath();ctx.moveTo(7,36);ctx.lineTo(7,-20);ctx.stroke();
      }
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }
  ctx.restore();
}

// ===== DRAW SKIBIDI TOILET =====
function drawToilet(ctx,cx,by,sc=1,type='normal',hpPct=1,name=''){
  ctx.save();ctx.translate(cx,by);ctx.scale(sc,sc);
  // shadow
  ctx.fillStyle='rgba(0,0,0,.32)';ctx.beginPath();ctx.ellipse(0,8,27,7,0,0,Math.PI*2);ctx.fill();
  // toilet base
  ctx.fillStyle='#e0e0e0';
  ctx.beginPath();ctx.moveTo(-22,0);ctx.quadraticCurveTo(-26,-10,-22,-20);ctx.lineTo(22,-20);ctx.quadraticCurveTo(26,-10,22,0);ctx.closePath();ctx.fill();
  ctx.fillStyle='#f0f0f0';ctx.beginPath();ctx.ellipse(0,-20,22,8,0,0,Math.PI*2);ctx.fill();
  // water in bowl
  ctx.fillStyle='rgba(50,140,210,.35)';ctx.beginPath();ctx.ellipse(0,-20,16,6,0,0,Math.PI*2);ctx.fill();
  // toilet seat rim
  ctx.strokeStyle='#bbb';ctx.lineWidth=3;ctx.beginPath();ctx.ellipse(0,-20,22,8,0,0,Math.PI*2);ctx.stroke();
  // tank
  const tankCol=type==='military'?'#3a5a20':type==='boss'?'#7b1a1a':type==='lazer'||type==='lazerbig'?'#4a2080':type==='kamikaze'?'#8b2010':type==='spider'?'#205020':type==='medium'?'#1a4a7a':type==='bomber'?'#7a4010':'#c8c8c8';
  ctx.fillStyle=tankCol;ctx.beginPath();ctx.roundRect(-17,-58,34,30,4);ctx.fill();
  // tank highlight
  ctx.fillStyle='rgba(255,255,255,.18)';ctx.beginPath();ctx.roundRect(-15,-56,32,28,3);ctx.fill();
  // tank lid
  ctx.fillStyle=type==='normal'||type==='medium'||type==='big'?'#bbb':'#888';
  ctx.beginPath();ctx.roundRect(-19,-62,38,8,3);ctx.fill();
  // flush handle
  ctx.fillStyle='#999';ctx.beginPath();ctx.roundRect(15,-54,6,10,2);ctx.fill();
  // bolts on tank top
  ctx.fillStyle='#aaa';
  ctx.beginPath();ctx.arc(-12,-58,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(12,-58,2,0,Math.PI*2);ctx.fill();
  // --- face from bowl ---
  const fy=-38;
  // neck stub
  ctx.fillStyle='#c08060';ctx.beginPath();ctx.ellipse(0,fy+8,9,12,0,0,Math.PI*2);ctx.fill();
  // head
  ctx.fillStyle='#d4956a';ctx.beginPath();ctx.arc(0,fy-10,21,0,Math.PI*2);ctx.fill();
  // hair — dark slicked back
  ctx.fillStyle='#1a0f08';
  ctx.beginPath();ctx.arc(0,fy-26,21,Math.PI,0);ctx.fill();
  ctx.beginPath();ctx.arc(-20,fy-12,9,Math.PI*1.4,Math.PI*.6);ctx.fill();
  ctx.beginPath();ctx.arc(20,fy-12,9,Math.PI*.4,Math.PI*1.6);ctx.fill();
  // forehead stubble
  ctx.fillStyle='rgba(30,15,5,.3)';
  [[-5,fy-26],[0,fy-27],[5,fy-26]].forEach(([x,y])=>{ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();});
  // eyebrows (angry/maniacal)
  ctx.strokeStyle='#1a0f08';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(-16,fy-20);ctx.lineTo(-4,fy-17);ctx.stroke();
  ctx.beginPath();ctx.moveTo(16,fy-20);ctx.lineTo(4,fy-17);ctx.stroke();
  // eye whites (wide, crazy)
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(-8,fy-12,8,9,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(8,fy-12,8,9,0,0,Math.PI*2);ctx.fill();
  // irises
  ctx.fillStyle='#4a8adf';
  ctx.beginPath();ctx.arc(-8,fy-12,5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,fy-12,5,0,Math.PI*2);ctx.fill();
  // pupils
  ctx.fillStyle='#000';
  ctx.beginPath();ctx.arc(-8,fy-12,2.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(8,fy-12,2.5,0,Math.PI*2);ctx.fill();
  // eye shine
  ctx.fillStyle='rgba(255,255,255,.85)';
  ctx.beginPath();ctx.arc(-10,fy-14,1.5,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(6,fy-14,1.5,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#b87040';ctx.beginPath();ctx.arc(0,fy-6,3.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath();ctx.arc(-2,fy-5,1.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(2,fy-5,1.2,0,Math.PI*2);ctx.fill();
  // chin/jaw wrinkle
  ctx.fillStyle='rgba(160,100,50,.3)';
  ctx.beginPath();ctx.arc(0,fy+4,6,0,Math.PI);ctx.fill();
  // BIG CREEPY GRIN
  ctx.fillStyle='#0f0600';
  ctx.beginPath();ctx.arc(0,fy,16,0.05,Math.PI-.05);ctx.fill();
  // yellowed teeth
  ctx.fillStyle='#d4c44a';
  for(let i=-3;i<=3;i++){ctx.beginPath();ctx.roundRect(i*4.5-2,fy-3,4,9,1);ctx.fill();}
  // gum line
  ctx.fillStyle='#c06060';ctx.fillRect(-16,fy-3,32,2);
  // cheek colour
  ctx.fillStyle='rgba(200,80,60,.2)';
  ctx.beginPath();ctx.arc(-14,fy-5,6,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(14,fy-5,6,0,Math.PI*2);ctx.fill();
  // === TYPE EXTRAS ===
  if(type==='military'){
    // army cap
    ctx.fillStyle='#2d5016';ctx.beginPath();ctx.roundRect(-22,fy-34,44,14,3);ctx.fill();
    ctx.fillStyle='#1a3010';ctx.beginPath();ctx.roundRect(-25,fy-22,50,6,2);ctx.fill();
    // star badge
    ctx.fillStyle='#f1c40f';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.fillText('★',0,fy-23);
  }
  if(type==='lazer'||type==='lazerbig'){
    ctx.strokeStyle='rgba(255,40,40,.8)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(-8,fy-12);ctx.lineTo(-45,fy-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(8,fy-12);ctx.lineTo(45,fy-12);ctx.stroke();
    ctx.strokeStyle='rgba(255,40,40,.3)';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(-8,fy-12);ctx.lineTo(-45,fy-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(8,fy-12);ctx.lineTo(45,fy-12);ctx.stroke();
  }
  if(type==='kamikaze'){
    // explosive straps
    ctx.strokeStyle='#8b2010';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-22,-30);ctx.lineTo(22,-30);ctx.stroke();
    ctx.beginPath();ctx.moveTo(-22,-42);ctx.lineTo(22,-42);ctx.stroke();
  }
  if(type==='spider'){
    // spider legs
    ctx.strokeStyle='#205020';ctx.lineWidth=2;
    [[-1.2,-.4],[.8,-.2],[1.2,.2],[.5,.6]].forEach(([a,b],i)=>{
      const side=i<2?-1:1;
      ctx.save();ctx.translate(side*22,-35);ctx.rotate(side*(a));
      ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(side*20,b*20);ctx.stroke();ctx.restore();
    });
  }
  if(type==='boss'){
    // crown
    ctx.fillStyle='#f1c40f';
    ctx.beginPath();ctx.moveTo(-18,fy-31);ctx.lineTo(-18,fy-44);ctx.lineTo(-10,fy-38);ctx.lineTo(0,fy-48);ctx.lineTo(10,fy-38);ctx.lineTo(18,fy-44);ctx.lineTo(18,fy-31);ctx.closePath();ctx.fill();
    ctx.fillStyle='#e74c3c';[-8,0,8].forEach(x=>{ctx.beginPath();ctx.arc(x,fy-43,2.5,0,Math.PI*2);ctx.fill();});
  }
  // HP bar
  ctx.fillStyle='rgba(0,0,0,.6)';ctx.beginPath();ctx.roundRect(-26,-75,52,8,3);ctx.fill();
  ctx.fillStyle=hpPct>.5?'#27ae60':(hpPct>.25?'#f39c12':'#e74c3c');
  ctx.beginPath();ctx.roundRect(-26,-75,52*Math.max(0,hpPct),8,3);ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.2)';ctx.lineWidth=.5;ctx.beginPath();ctx.roundRect(-26,-75,52,8,3);ctx.stroke();
  // name
  if(name){ctx.fillStyle='rgba(255,255,255,.85)';ctx.font='bold 8px Rajdhani,sans-serif';ctx.textAlign='center';ctx.fillText(name.substring(0,16),0,-79);}
  ctx.restore();
}

// ===== PANELS =====
function openPanel(id){
  document.querySelectorAll('.panel-overlay').forEach(p=>p.classList.remove('open'));
  document.getElementById(id).classList.add('open');
  if(id==='chars-panel')buildChars();
  if(id==='info-panel')document.getElementById('info-content').innerHTML=T('infoHtml');
}
function closePanel(id){document.getElementById(id).classList.remove('open');}
function closeAllPanels(){document.querySelectorAll('.panel-overlay').forEach(p=>p.classList.remove('open'));}
// backdrop click closes panel (but NOT result overlays)
document.querySelectorAll('.panel-overlay').forEach(ov=>{
  ov.addEventListener('click',function(e){if(e.target===this){sfxClick();closePanel(this.id);}});
});

// ===== SCREENS =====
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  const m=id==='menu-screen',l=id==='levels-screen';
  document.getElementById('btn-settings').style.display=(m||l)?'flex':'none';
  document.getElementById('btn-chars').style.display=m?'flex':'none';
}
function showMenu(){sfxClick();stopGame();closeAllPanels();showScreen('menu-screen');}
function showLevels(){buildLevels();showScreen('levels-screen');}
function exitGame(){sfxClick();stopGame();goLevels();}
function goLevels(){
  document.getElementById('win-overlay').classList.remove('open');
  document.getElementById('lose-overlay').classList.remove('open');
  closeAllPanels();buildLevels();showScreen('levels-screen');
}

// ===== LEVELS BUILD =====
function buildLevels(){
  const grid=document.getElementById('levels-grid');grid.innerHTML='';
  document.getElementById('lbl-levels').textContent=T('levels');
  for(let i=1;i<=50;i++){
    const isBoss=[5,10,15,20,25,30].includes(i);
    const isGray=isBoss&&i>30;
    const btn=document.createElement('div');
    btn.className='lvl-btn '+(isGray?'locked':isBoss?'boss':'normal');
    btn.innerHTML=`<div class="ln">${i}</div><div style="font-size:9px">${isBoss?'⭐':''}</div>`;
    if(!isGray)btn.addEventListener('click',()=>{sfxClick();startLevel(i);});
    grid.appendChild(btn);
  }
  const m=document.createElement('div');m.className='lvl-more';m.textContent='🔒 Daha fazlası yeni güncellemelerde...';grid.appendChild(m);
}

// ===== GAME STATE =====
let coins=parseInt(localStorage.getItem('twg_coins')||'0');
let currentLevel=1,playerHp=200,playerMaxHp=200;
let gameRunning=false,animId=null,gamePhase='idle';
let enemies=[],enemyIndex=0,levelEnemies=[];
let currentBoss=null,bossActive=false;
let abCDs=[0,0,0],cdIvs=[null,null,null];
let spawnIv=null,attackIv=null;
let levelCoins=0,coinPerKill=2,coinPerLevel=8;
let hitFX=[],playerAnim=0,lastTs=0;
let pistolAnim=0,pistolAnimActive=false,pistolPhase=0; // 0=idle,1=draw,2=aim,3=fire,4=holster
let gc,gx,gW,gH;

function getEnemyList(lvl){
  if(lvl===5) return [{name:'Military Toilet',hp:50,dmg:20,type:'military',isBoss:true}];
  if(lvl===10)return [{name:'Devil Toilet',hp:100,dmg:40,type:'boss',isBoss:true}];
  if(lvl===15)return [{name:'GMAN 1.0',hp:200,dmg:50,type:'boss',isBoss:true}];
  if(lvl===20)return [{name:'Flamethrower Toilet',hp:300,dmg:70,type:'boss',isBoss:true}];
  if(lvl===25)return [{name:'Inf.Titan Speakerman',hp:500,dmg:75,type:'boss',isBoss:true}];
  if(lvl===30)return [{name:'Big Plane Rocketer',hp:650,dmg:75,type:'boss',isBoss:true}];
  const cnt=Math.min(3+Math.floor(lvl/4),8);const arr=[];
  for(let i=0;i<cnt;i++){
    if(lvl<=3)       arr.push({name:'Normal Toilet',hp:10,dmg:3,type:'normal'});
    else if(lvl<=6)  arr.push({name:'Medium Toilet',hp:30,dmg:6,type:'medium'});
    else if(lvl<=10) arr.push({name:'Big Toilet',hp:50,dmg:9,type:'big'});
    else if(lvl<=15) arr.push(i%2?{name:'Large Toilet',hp:60,dmg:12,type:'big'}:{name:'Spider Toilet',hp:40,dmg:10,type:'spider'});
    else if(lvl<=20) arr.push([{name:'Heli Toilet',hp:70,dmg:14,type:'medium'},{name:'Large Toilet',hp:60,dmg:12,type:'big'},{name:'Big Toilet',hp:50,dmg:9,type:'normal'}][i%3]);
    else if(lvl<=40) arr.push([{name:'Kamikaze',hp:30,dmg:20,type:'kamikaze'},{name:'Lazered Toilet',hp:45,dmg:15,type:'lazer'},{name:'Bomber Heli',hp:80,dmg:18,type:'boss'}][i%3]);
    else             arr.push([{name:'Glasses Toilet',hp:70,dmg:20,type:'medium'},{name:'Saw Toilet',hp:60,dmg:25,type:'boss'},{name:'Lazered Big',hp:90,dmg:22,type:'lazer'},{name:'Spider Toilet',hp:40,dmg:10,type:'spider'},{name:'Kamikaze',hp:30,dmg:20,type:'kamikaze'}][i%5]);
  }
  return arr;
}

function startLevel(lvl){
  currentLevel=lvl;
  levelCoins=0;coinPerKill=2+Math.floor(lvl/10)*2;coinPerLevel=8+Math.floor(lvl/10)*4;
  playerHp=playerMaxHp=200;abCDs=[0,0,0];clearAllCDs();hitFX=[];gamePhase='fighting';
  bossActive=false;currentBoss=null;
  document.getElementById('win-overlay').classList.remove('open');
  document.getElementById('lose-overlay').classList.remove('open');
  closeAllPanels();
  levelEnemies=getEnemyList(lvl).map(e=>({...e,maxHp:e.hp,curHp:e.hp}));
  enemyIndex=0;enemies=[{...levelEnemies[0]}];
  bossActive=!!levelEnemies[0].isBoss;
  if(bossActive){currentBoss=enemies[0];}
  document.getElementById('boss-hp-wrap').style.display=bossActive?'block':'none';
  if(bossActive){document.getElementById('boss-name-label').textContent=levelEnemies[0].name;updateBossHp();}
  document.getElementById('game-level-label').textContent=(curLang==='en'?'LEVEL ':'BÖLÜM ')+lvl;
  document.getElementById('hud-coins').textContent=coins;
  updateHpBars();
  showScreen('game-screen');
  gc=document.getElementById('game-canvas');gx=gc.getContext('2d');
  resizeGC();window.addEventListener('resize',resizeGC);
  gameRunning=true;playerAnim=0;lastTs=0;
  if(animId)cancelAnimationFrame(animId);
  animId=requestAnimationFrame(gameLoop);
  clearTimers();
  attackIv=setInterval(()=>{
    if(!gameRunning||gamePhase!=='fighting')return;
    const a=enemies.filter(e=>e.curHp>0);
    if(a.length)dealPlayerDmg(a[Math.floor(Math.random()*a.length)].dmg);
  },bossActive?1700:2100);
  if(!bossActive){
    spawnIv=setInterval(()=>{
      if(!gameRunning||gamePhase!=='fighting')return;
      if(enemyIndex+1<levelEnemies.length&&enemies.every(e=>e.curHp<=0)){enemyIndex++;enemies.push({...levelEnemies[enemyIndex]});}
    },1400);
  }
  startBgm();
}
function resizeGC(){gc.width=gc.offsetWidth||window.innerWidth;gc.height=gc.offsetHeight||(window.innerHeight-60);gW=gc.width;gH=gc.height;}

function triggerPistolAnim(){
  pistolAnimActive=true;pistolPhase=0;pistolAnim=0;
}

function gameLoop(ts){
  if(!gameRunning)return;
  const dt=Math.min((ts-lastTs)/1000,.05);lastTs=ts;
  gx.clearRect(0,0,gW,gH);
  // bg
  const bg=gx.createLinearGradient(0,0,0,gH);
  bg.addColorStop(0,'#030810');bg.addColorStop(1,'#091428');
  gx.fillStyle=bg;gx.fillRect(0,0,gW,gH);
  gx.fillStyle='rgba(26,111,212,.1)';gx.fillRect(0,gH*.73,gW,gH*.27);
  gx.strokeStyle='rgba(45,156,255,.22)';gx.lineWidth=1;gx.beginPath();gx.moveTo(0,gH*.73);gx.lineTo(gW,gH*.73);gx.stroke();
  // enemies
  const alive=enemies.filter(e=>e.curHp>0);
  if(bossActive&&currentBoss){
    const s=Math.min(gW/260,gH/300)*.9;
    currentBoss._x=gW*.65;currentBoss._y=gH*.55;
    drawToilet(gx,gW*.65,gH*.55,s,currentBoss.type,currentBoss.curHp/currentBoss.maxHp,currentBoss.name);
  } else {
    alive.forEach((e,i)=>{
      const tot=alive.length;
      const ex=gW*(tot===1?.62:.4+i*(0.45/Math.max(tot-1,1)));
      const ey=gH*.46+Math.sin(playerAnim*2+i)*5;
      e._x=ex;e._y=ey;
      const s=Math.min(gW/260,gH/300)*.78;
      drawToilet(gx,ex,ey,s,e.type,e.curHp/e.maxHp,e.name);
    });
  }
  // player
  const ps=Math.min(gW/260,gH/300)*.85;
  const bob=Math.sin(playerAnim*3)*3;
  // Pistol animation update
  if(pistolAnimActive){
    pistolAnim+=dt*4;
    if(pistolAnim<1) pistolPhase=1;      // drawing gun
    else if(pistolAnim<1.5) pistolPhase=2; // aiming
    else if(pistolAnim<1.8) pistolPhase=3; // firing
    else if(pistolAnim<2.4) pistolPhase=4; // holstering
    else { pistolAnimActive=false; pistolPhase=0; pistolAnim=0; }
  }
  drawCameraman(gx,gW*.22,gH*.72+bob,ps,pistolPhase);
  // hit fx
  hitFX=hitFX.filter(h=>{
    h.life-=dt;if(h.life<=0)return false;
    const a=h.life/h.ml;
    gx.save();gx.globalAlpha=a;gx.fillStyle=h.c;
    gx.font=`bold ${h.sz}px Orbitron,sans-serif`;gx.textAlign='center';
    gx.fillText(h.txt,h.x,h.y-(1-a)*38);gx.restore();return true;
  });
  playerAnim+=dt;
  animId=requestAnimationFrame(gameLoop);
}

function addHitFX(x,y,txt,c='#f1c40f',sz=22){hitFX.push({x,y,txt,c,sz,life:.85,ml:.85});}
function dealPlayerDmg(dmg){
  playerHp=Math.max(0,playerHp-dmg);sfxHit();
  spawnDmgEl(dmg,'#e74c3c',true);updateHpBars();
  if(playerHp<=0)endGame(false);
}
function updateHpBars(){
  const pf=document.getElementById('player-hp-fill');
  pf.style.width=(playerHp/playerMaxHp*100)+'%';
  pf.style.background=playerHp/playerMaxHp>.3?'linear-gradient(90deg,#27ae60,#2ecc71)':'linear-gradient(90deg,#c0392b,#e74c3c)';
}
function updateBossHp(){if(!currentBoss)return;document.getElementById('boss-hp-fill').style.width=(currentBoss.curHp/currentBoss.maxHp*100)+'%';}
function spawnDmgEl(dmg,col,isPlayer){
  const el=document.createElement('div');el.className='dmg-text';
  el.style.color=col;el.style.left=(12+Math.random()*55)+'%';el.style.top=(isPlayer?51:22)+'%';
  el.textContent=`-${dmg}`;document.body.appendChild(el);setTimeout(()=>el.remove(),1e3);
}

// ===== ABILITIES =====
const ABS=[{dmg:5,cost:0,cd:.9},{dmg:7,cost:0,cd:1.3},{dmg:15,cost:50,cd:.6}];
function useAbility(idx){
  if(gamePhase!=='fighting')return;
  if(abCDs[idx]>0)return;
  const ab=ABS[idx];
  if(ab.cost>0&&coins<ab.cost){showCoinFlash('💸 '+T('retryHint').substring(0,5)+'!');return;}
  if(ab.cost>0){coins-=ab.cost;saveCoins();document.getElementById('hud-coins').textContent=coins;}
  if(idx===0)sfxPunch();else if(idx===1)sfxKick();else{sfxShoot();triggerPistolAnim();}
  const alive=enemies.filter(e=>e.curHp>0);if(!alive.length)return;
  const tgt=alive[Math.floor(Math.random()*alive.length)];
  tgt.curHp=Math.max(0,tgt.curHp-ab.dmg);
  if(bossActive&&currentBoss){currentBoss.curHp=tgt.curHp;updateBossHp();}
  addHitFX(tgt._x||gW*.5,(tgt._y||gH*.4)-55,`-${ab.dmg}`,idx===2?'#e74c3c':'#f1c40f');
  spawnDmgEl(ab.dmg,'#f1c40f',false);
  if(tgt.curHp<=0)enemyKilled(tgt);
  startCD(idx,ab.cd);
}
function startCD(idx,dur){
  abCDs[idx]=dur;
  const btn=document.getElementById(`ab${idx+1}`);btn.classList.add('on-cooldown');
  let rem=dur;const div=document.createElement('div');div.className='cd-overlay';div.textContent=Math.ceil(rem);btn.appendChild(div);
  const iv=setInterval(()=>{rem-=.1;div.textContent=Math.ceil(Math.max(0,rem));if(rem<=0){clearInterval(iv);abCDs[idx]=0;btn.classList.remove('on-cooldown');if(div.parentNode)div.remove();}},100);
  cdIvs[idx]=iv;
}
function clearAllCDs(){cdIvs.forEach(iv=>{if(iv)clearInterval(iv);});cdIvs=[null,null,null];['ab1','ab2','ab3'].forEach(id=>{const b=document.getElementById(id);b.classList.remove('on-cooldown');const o=b.querySelector('.cd-overlay');if(o)o.remove();});}
function enemyKilled(e){
  sfxDie();const earned=coinPerKill;coins+=earned;levelCoins+=earned;saveCoins();
  document.getElementById('hud-coins').textContent=coins;showCoinFlash(`+${earned}🪙`);
  if(bossActive){setTimeout(()=>endGame(true),400);return;}
  if(enemies.every(en=>en.curHp<=0)){
    if(enemyIndex+1>=levelEnemies.length)setTimeout(()=>endGame(true),500);
    else{enemyIndex++;enemies.push({...levelEnemies[enemyIndex]});}
  }
}

// ===== GAME END =====
function endGame(won){
  if(gamePhase!=='fighting')return;
  gamePhase=won?'won':'lost';
  clearTimers();
  if(won){
    sfxWin();coins+=coinPerLevel;saveCoins();
    document.getElementById('hud-coins').textContent=coins;
    document.getElementById('win-coins').textContent=`+${levelCoins+coinPerLevel} 🪙`;
    setTimeout(()=>document.getElementById('win-overlay').classList.add('open'),600);
  } else {
    sfxLose();
    setTimeout(()=>document.getElementById('lose-overlay').classList.add('open'),650);
  }
}
function stopGame(){gameRunning=false;if(animId){cancelAnimationFrame(animId);animId=null;}clearTimers();clearAllCDs();window.removeEventListener('resize',resizeGC);}
function clearTimers(){if(spawnIv){clearInterval(spawnIv);spawnIv=null;}if(attackIv){clearInterval(attackIv);attackIv=null;}}
function nextLevel(){document.getElementById('win-overlay').classList.remove('open');stopGame();startLevel(Math.min(currentLevel+1,50));}
function retryLevel(){document.getElementById('lose-overlay').classList.remove('open');stopGame();startLevel(currentLevel);}
function showCoinFlash(t){const el=document.getElementById('coin-flash');el.textContent=t;el.style.opacity='1';setTimeout(()=>el.style.opacity='0',1300);}
function saveCoins(){localStorage.setItem('twg_coins',coins);}

// tap canvas = punch
document.getElementById('game-canvas').addEventListener('click',()=>{if(gamePhase==='fighting')useAbility(0);});
document.getElementById('game-canvas').addEventListener('touchend',e=>{e.preventDefault();if(gamePhase==='fighting')useAbility(0);},{passive:false});

// ===== CHARS =====
const CHARS=[{n:'Cameraman',i:'📷',free:true},{n:'Speakerman',i:'📢'},{n:'Tvman',i:'📺'},{n:'Large Cameraman',i:'🎥'},{n:'Large Speakerman',i:'🔊'},{n:'Large Tvman',i:'📡'},{n:'Plungerman',i:'🪠'},{n:'Dark Speakerman',i:'🖤'},{n:'Scientist Tvman',i:'🔬'},{n:'TITAN CAMERAMAN',i:'👁'}];
let selChar=0;
function buildChars(){
  const g=document.getElementById('chars-grid');g.innerHTML='';
  CHARS.forEach((c,i)=>{
    const d=document.createElement('div');
    d.className='char-card '+(c.free?'free':'locked')+(i===selChar?' selected':'');
    d.innerHTML=`<div style="font-size:28px">${c.i}</div><div class="cname">${c.n}</div>${!c.free?`<div class="clock">🔒</div><div class="csoon">${T('comingSoon')}</div>`:''}`;
    if(c.free)d.addEventListener('click',()=>{sfxClick();selChar=i;buildChars();});
    g.appendChild(d);
  });
}

// hero logo is img tag, no canvas needed

// ===== INIT =====
applyLang();
buildChars();
document.getElementById('hud-coins').textContent=coins;
</script>
